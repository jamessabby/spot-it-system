<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091e13"/>
      <stop offset="50%" stop-color="#0f2d1d"/>
      <stop offset="100%" stop-color="#05140c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Grid lines -->
  <path d="M0 90 H800 M0 180 H800 M0 270 H800 M0 360 H800 M160 0 V450 M320 0 V450 M480 0 V450 M640 0 V450" 
        stroke="rgba(74,222,128,0.06)" stroke-width="1"/>

  <!-- Center Circle Icon -->
  <circle cx="400" cy="190" r="48" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Camera/Reset Icon -->
  <path d="M380 180 L380 200 L415 190 Z" fill="#86efac"/>
  <path d="M400 162 A 28 28 0 1 1 372 190" fill="none" stroke="#4ade80" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Text Badge -->
  <rect x="260" y="270" width="280" height="36" rx="18" fill="rgba(6,24,14,0.8)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <circle cx="282" cy="288" r="4" fill="#eab308"/>
  <text x="296" y="293" font-family="'Outfit', sans-serif" font-size="13" font-weight="700" fill="#facc15" letter-spacing="1">SYSTEM RESET · STANDBY</text>

  <!-- Subtitle -->
  <text x="400" y="335" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    Reference frame cleared. Capture baseline snapshot to start live monitoring.
  </text>
</svg>
